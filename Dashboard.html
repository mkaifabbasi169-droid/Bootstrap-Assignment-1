<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>



<div class="row bg-primary p-3 align-items-center" style="min-height:120px;">

    <div class="col-6">
        <div class="rounded-circle overflow-hidden border border-3 border-white"
             style="width:70px;height:70px;">
            <img src="./download.png"
                 class="w-100 h-100"
                 style="object-fit:cover;">
        </div>
    </div>

    <div class="col-6 d-flex justify-content-end align-items-center">

        <button class="btn btn-warning fw-bold">
            Welcome Kaif Abbasi
        </button>

    </div>

</div>


<div class="container mt-4">

    <div class="row">
        <div class="col-12">
            <h2 class="text-primary">DASHBOARD</h2>
        </div>
    </div>

    

    <div class="row mt-3">

        <div class="col-md-4 mb-3">

            <div class="card bg-primary text-white">

                <div class="card-body">

                    <h5>Total Students</h5>
                    <h1>50</h1>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card bg-primary text-white">

                <div class="card-body">

                    <h5>Present Students</h5>
                    <h1>35</h1>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card bg-primary text-white">

                <div class="card-body">

                    <h5>Absent Students</h5>
                    <h1>15</h1>

                </div>

            </div>

        </div>

    </div>

    

    <div class="row mt-4">

        <div class="col-12">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Class</th>
                        <th>Email</th>
                        <th>Status</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>
                        <td>1</td>
                        <td>Ali</td>
                        <td>BSCS</td>
                        <td>ali@gmail.com</td>
                        <td><span class="badge bg-success">Present</span></td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>Ahmed</td>
                        <td>BSIT</td>
                        <td>ahmed@gmail.com</td>
                        <td><span class="badge bg-danger">Absent</span></td>
                    </tr>

                    <tr>
                        <td>3</td>
                        <td>Usman</td>
                        <td>BBA</td>
                        <td>usman@gmail.com</td>
                        <td><span class="badge bg-success">Present</span></td>
                    </tr>

                    <tr>
                        <td>4</td>
                        <td>Bilal</td>
                        <td>BSE</td>
                        <td>bilal@gmail.com</td>
                        <td><span class="badge bg-success">Present</span></td>
                    </tr>

                    <tr>
                        <td>5</td>
                        <td>Hamza</td>
                        <td>BSCS</td>
                        <td>hamza@gmail.com</td>
                        <td><span class="badge bg-danger">Absent</span></td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
