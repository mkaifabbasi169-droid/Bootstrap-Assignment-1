<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <div class="container-fluid bg-primary p-3">
    <div class="row">

    <div class="col-6">

    <div class="rounded-circle overflow-hidden border border-3 border-white"
         style="width:70px; height:70px;">

        <img src="./download.png"
             alt="Logo"
             class="w-100 h-100"
             style="object-fit: cover;">

    </div>

</div>

    </div>

</div>
    </div>
</div>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4 bg-primary p-4 rounded">

            <div class="mb-3">
                <label class="fw-bold text-white">Email</label>
                <input type="email" id="email" class="form-control" placeholder=" Email">
            </div>

            <div class="mb-3">
                <label class="fw-bold text-white">Password</label>
                <input type="password" id="password" class="form-control" placeholder=" Password">
            </div>

            <div class="text-end">
                <button class="btn btn-light" onclick="login()">
                    Login
                </button>
            </div>

        </div>

    </div>

</div>

<script>

function login(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email == "" || password == ""){
        alert("Please Enter Email And Password");
    }
    else{
        window.location.href = "Dashboard.html";
    }

}

</script>

</body>
</html>
